name: Deploy Databricks Bundle

on:
  push:
    branches: [main, master]

jobs:
  build:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Build wheel
        run: python setup.py bdist_wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          retention-days: 7

  deploy:
    name: Deploy Databricks Bundle
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Configure Databricks Credentials
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/config << EOF
          [DEFAULT]
          host = $DATABRICKS_HOST
          token = $DATABRICKS_TOKEN
          EOF

      - name: Upload wheel to DBFS
        run: |
          WHEEL_FILE=$(ls dist/*.whl | head -1)
          WHEEL_NAME=$(basename "$WHEEL_FILE")
          echo "Uploading wheel: $WHEEL_NAME"
          databricks fs mkdirs dbfs:/libs --profile DEFAULT
          databricks fs cp "$WHEEL_FILE" "dbfs:/libs/$WHEEL_NAME" --overwrite --profile DEFAULT
          echo "Wheel uploaded to dbfs:/libs/$WHEEL_NAME"

      - name: Deploy Bundle
        run: databricks bundle deploy --profile DEFAULT -t dev

      - name: Run Autoloader Job
        run: |
          # Use the KEY from the YAML (autoloader_job), not the display name
          databricks bundle run autoloader_job --profile DEFAULT -t dev
