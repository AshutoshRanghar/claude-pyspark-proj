name: Deploy Databricks Bundle

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the MODERN Go-based CLI (v0.200+)
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy Bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          # This line prevents the "IndexError" and Azure auth prompts
          DATABRICKS_AUTH_TYPE: pat 
        run: databricks bundle deploy -t dev

      - name: Run Autoloader Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
        run: |
          # Use the job key 'autoloader_job' defined in your databricks.yml
          databricks bundle run autoloader_job -t dev
