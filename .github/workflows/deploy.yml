name: Deploy Databricks Bundle

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy Bundle
    runs-on: ubuntu-latest
    
    # Setting these at the job level so all steps can see them
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_AUTH_TYPE: pat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify Authentication
        run: |
          databricks auth describe
          echo "Connected to: $DATABRICKS_HOST"

      - name: Deploy Bundle
        run: |
          # This builds the wheel and updates the Databricks Job in one go
          databricks bundle deploy -t dev

      - name: Run Autoloader Job
        run: |
          # 'autoloader_job' must match the key in your databricks.yml
          databricks bundle run autoloader_job -t dev
