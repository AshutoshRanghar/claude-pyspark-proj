name: Deploy & Run Databricks Job

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Validate DAB
        run: |
          databricks bundle validate \
            --target ${{ github.event.inputs.environment || 'dev' }}

  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Deploy Bundle
        run: |
          databricks bundle deploy \
            --target ${{ github.event.inputs.environment || 'dev' }}

  run-job:
    name: Run Streaming Job
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Get Job ID
        id: job_id
        run: |
          JOB_ID=$(databricks jobs list --filter 'name = "Event Hub Kafka Streaming Pipeline"' \
            --output json | jq -r '.jobs[0].job_id')
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Job ID: $JOB_ID"

      - name: Run Job
        id: run_job
        run: |
          RUN_ID=$(databricks jobs run-now --job-id ${{ steps.job_id.outputs.job_id }} \
            --output json | jq -r '.run_id')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      - name: Wait for Job Completion
        run: |
          for i in {1..120}; do
            STATUS=$(databricks runs get --run-id ${{ steps.run_job.outputs.run_id }} \
              --output json | jq -r '.state')
            echo "Attempt $i: Job Status = $STATUS"

            if [ "$STATUS" = "TERMINATED" ] || [ "$STATUS" = "SKIPPED" ]; then
              RESULT=$(databricks runs get --run-id ${{ steps.run_job.outputs.run_id }} \
                --output json | jq -r '.state_message')
              echo "Job completed: $RESULT"
              break
            fi

            if [ "$STATUS" = "INTERNAL_ERROR" ]; then
              echo "Job failed with internal error"
              exit 1
            fi

            sleep 30
          done

      - name: Get Job Logs
        if: always()
        run: |
          databricks runs get-output --run-id ${{ steps.run_job.outputs.run_id }} \
            --output text || true

      - name: Report Status
        if: success()
        run: echo "✓ Streaming job completed successfully!"

      - name: Report Failure
        if: failure()
        run: |
          echo "✗ Job execution failed"
          exit 1
