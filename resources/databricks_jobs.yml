resources:
  jobs:
    autoloader_job:
      name: "Autoloader Blob Storage Ingestion"
      tasks:
        - task_key: run_autoloader
          existing_cluster_id: "0317-084801-hofwe5r6"
          # BEST PRACTICE: Use your entry point from setup.py
          python_wheel_task:
            package_name: "claude-pyspark-proj"
            entry_point: "autoloader-ingestion"
          libraries:
            - whl: ../dist/*.whl # Path relative to THIS file

    event_hub_streaming_job:
      name: "Event Hub Kafka Streaming Pipeline"
      tasks:
        - task_key: run_event_hub_streaming
          existing_cluster_id: "0317-084801-hofwe5r6"
          python_wheel_task:
            package_name: "claude-pyspark-proj"
            entry_point: "event-hub-streaming"
          libraries:
            - whl: ../dist/*.whl
