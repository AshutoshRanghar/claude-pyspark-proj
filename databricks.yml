bundle:
  name: claude-pyspark-proj

artifacts:
  main_wheel:
    type: whl
    path: . # This builds the wheel from your root setup.py

resources:
  jobs:
    autoloader_job:
      name: "Autoloader Blob Storage Ingestion"
      tasks:
        - task_key: run_autoloader
          existing_cluster_id: "0317-084801-hofwe5r6"
          python_wheel_task:
            package_name: "claude-pyspark-proj"
            entry_point: "autoloader-ingestion"
          libraries:
            - whl: ./dist/*.whl # The CLI resolves this path during deploy

targets:
  dev:
    mode: development
    workspace:
